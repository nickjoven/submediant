<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Synchronization Cost Framework — Concept Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; }
#graph { width: 100vw; height: 100vh; }
.tooltip {
  position: absolute; padding: 10px 14px; background: #1a1a2e; border: 1px solid #444;
  border-radius: 6px; font-size: 13px; max-width: 360px; pointer-events: none;
  display: none; z-index: 100; line-height: 1.5;
}
.tooltip .derivation { color: #6ec; font-size: 11px; }
.tooltip .residual { color: #fc6; font-weight: bold; }
.tooltip .detail { color: #bbb; }
.legend {
  position: absolute; bottom: 20px; left: 20px; background: #1a1a2e;
  border: 1px solid #333; border-radius: 8px; padding: 14px 18px;
  font-size: 12px; line-height: 2;
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }
.title {
  position: absolute; top: 16px; left: 20px; font-size: 14px; color: #888;
}
.scorecard {
  position: absolute; top: 16px; right: 20px; background: #1a1a2e;
  border: 1px solid #333; border-radius: 8px; padding: 12px 16px;
  font-size: 12px; line-height: 1.8; text-align: right;
}
.scorecard .val { color: #6f6; }
</style>
</head>
<body>
<div class="title">Synchronization Cost Framework · Concept Graph · D01–D29</div>
<div class="scorecard">
  <div>Ω<sub>Λ</sub> = 13/19 = <span class="val">0.6842</span> (0.07σ)</div>
  <div>R = 6 × 13<sup>54</sup> = <span class="val">8.53 × 10<sup>60</sup></span> (0.48%)</div>
  <div>Λl<sub>P</sub>² = 13<sup>−108</sup>/12 = <span class="val">10<sup>−121.4</sup></span> (0.1%)</div>
  <div style="color:#888; margin-top:4px">Free parameters: <span class="val">0</span></div>
</div>
<div id="graph"></div>
<div class="tooltip" id="tip"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f55"></div> Root (physical law)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#5af"></div> Core structure</div>
  <div class="legend-item"><div class="legend-dot" style="background:#5d5"></div> Derived result</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fc6"></div> Prediction (testable)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f7a"></div> Engineering target</div>
  <div class="legend-item"><div class="legend-dot" style="background:#888"></div> Conjectural</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a55"></div> Honest negative</div>
</div>
<script>
const W = window.innerWidth, H = window.innerHeight;
const canvas = document.createElement('canvas');
canvas.width = W; canvas.height = H;
document.getElementById('graph').appendChild(canvas);
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tip');

const colors = {
  root: '#f55', core: '#5af', structure: '#5af', derived: '#5d5',
  result: '#5d5', prediction: '#fc6', engineering: '#f7a',
  conjectural: '#888', negative: '#a55'
};

let graphData;
fetch('graph.json').then(r => r.json()).then(data => {
  graphData = data;
  const nodes = data.nodes.map((n, i) => ({
    ...n, x: W/2 + (Math.random()-0.5)*W*0.7, y: H/2 + (Math.random()-0.5)*H*0.7,
    vx: 0, vy: 0, r: n.type === 'prediction' ? 14 : n.type === 'root' ? 12 : n.type === 'core' ? 11 : 8
  }));
  const edges = data.edges.map(e => ({
    ...e,
    source: nodes.findIndex(n => n.id === e.from),
    target: nodes.findIndex(n => n.id === e.to)
  })).filter(e => e.source >= 0 && e.target >= 0);

  let drag = null, mx = 0, my = 0;

  canvas.addEventListener('mousedown', e => {
    const hit = nodes.find(n => Math.hypot(n.x - e.offsetX, n.y - e.offsetY) < n.r + 4);
    if (hit) { drag = hit; drag.fixed = true; }
  });
  canvas.addEventListener('mousemove', e => {
    mx = e.offsetX; my = e.offsetY;
    if (drag) { drag.x = mx; drag.y = my; }
    const hover = nodes.find(n => Math.hypot(n.x - mx, n.y - my) < n.r + 4);
    if (hover) {
      tip.style.display = 'block';
      tip.style.left = (mx + 16) + 'px';
      tip.style.top = (my - 10) + 'px';
      let html = `<strong>${hover.label}</strong><br><span class="detail">${hover.detail}</span>`;
      if (hover.derivation) html += `<br><span class="derivation">${hover.derivation}</span>`;
      if (hover.residual) html += `<br><span class="residual">${hover.residual}</span>`;
      tip.innerHTML = html;
    } else { tip.style.display = 'none'; }
  });
  canvas.addEventListener('mouseup', () => { if (drag) drag.fixed = false; drag = null; });

  function tick() {
    // Force-directed layout
    for (let i = 0; i < nodes.length; i++) {
      if (nodes[i].fixed) continue;
      let fx = 0, fy = 0;
      // Repulsion
      for (let j = 0; j < nodes.length; j++) {
        if (i === j) continue;
        let dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        let d = Math.max(Math.hypot(dx, dy), 1);
        let f = 800 / (d * d);
        fx += dx / d * f; fy += dy / d * f;
      }
      // Attraction along edges
      for (const e of edges) {
        let other = -1;
        if (e.source === i) other = e.target;
        if (e.target === i) other = e.source;
        if (other < 0) continue;
        let dx = nodes[other].x - nodes[i].x, dy = nodes[other].y - nodes[i].y;
        let d = Math.hypot(dx, dy);
        let f = (d - 100) * 0.01;
        fx += dx / d * f; fy += dy / d * f;
      }
      // Gravity toward center
      fx += (W/2 - nodes[i].x) * 0.0005;
      fy += (H/2 - nodes[i].y) * 0.0005;
      // Mild downward pull for hierarchy
      const typeOrder = {root: 0, core: 1, structure: 1, derived: 2, result: 2, prediction: 3, engineering: 4, conjectural: 4, negative: 3};
      fy += (typeOrder[nodes[i].type] || 2) * 0.3;

      nodes[i].vx = (nodes[i].vx + fx) * 0.85;
      nodes[i].vy = (nodes[i].vy + fy) * 0.85;
      nodes[i].x += nodes[i].vx;
      nodes[i].y += nodes[i].vy;
      nodes[i].x = Math.max(40, Math.min(W-40, nodes[i].x));
      nodes[i].y = Math.max(40, Math.min(H-40, nodes[i].y));
    }
    draw();
    requestAnimationFrame(tick);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // Edges
    for (const e of edges) {
      const s = nodes[e.source], t = nodes[e.target];
      ctx.beginPath();
      ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
      ctx.strokeStyle = '#333'; ctx.lineWidth = 0.8;
      ctx.stroke();
      // Arrow
      const angle = Math.atan2(t.y - s.y, t.x - s.x);
      const mx = (s.x + t.x)/2, my2 = (s.y + t.y)/2;
      ctx.beginPath();
      ctx.moveTo(mx + 5*Math.cos(angle-0.5), my2 + 5*Math.sin(angle-0.5));
      ctx.lineTo(mx + 5*Math.cos(angle), my2 + 5*Math.sin(angle));
      ctx.lineTo(mx + 5*Math.cos(angle+0.5), my2 + 5*Math.sin(angle+0.5));
      ctx.strokeStyle = '#444'; ctx.stroke();
      // Label
      if (e.label) {
        ctx.fillStyle = '#555'; ctx.font = '9px monospace';
        ctx.fillText(e.label, mx + 4, my2 - 4);
      }
    }
    // Nodes
    for (const n of nodes) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, 2*Math.PI);
      const c = colors[n.type] || '#888';
      ctx.fillStyle = c + '40'; ctx.fill();
      ctx.strokeStyle = c; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#ddd'; ctx.font = `${n.r > 10 ? 10 : 9}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y + n.r + 12);
    }
  }

  tick();
}).catch(err => {
  ctx.fillStyle = '#f55'; ctx.font = '16px monospace';
  ctx.fillText('Load graph.json (serve this directory)', 20, 40);
  ctx.fillText('python3 -m http.server 8080', 20, 64);
});
</script>
</body>
</html>
